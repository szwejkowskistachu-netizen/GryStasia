<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Podóbka Majkafta - Single File</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            color: white;
            text-shadow: 2px 2px 2px rgba(0,0,0,0.5);
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            font-weight: bold;
        }

        #instructions {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            margin-top: 20px;
            text-align: center;
            pointer-events: auto;
            cursor: pointer;
        }

        #inventory-bar {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            margin-bottom: 20px;
            pointer-events: auto;
        }

        .inventory-slot {
            width: 50px;
            height: 50px;
            border: 2px solid #555;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #333;
        }

        .inventory-slot.active {
            border-color: #fff;
            background: #666;
        }

        #menu {
            position: absolute;
            top: 10px;
            right: 10px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            pointer-events: auto;
        }

        button {
            padding: 5px 10px;
            cursor: pointer;
            background: #444;
            color: white;
            border: 1px solid #777;
        }

        button:hover {
            background: #666;
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="crosshair">+</div>
        <div id="inventory-bar"></div>
        <div id="instructions">
            W,A,S,D - Ruch | Spacja - Skok | LPM - Usuń | PPM - Postaw | 1-3 - Wybór bloku | Save/Load - Menu
            <br>Kliknij, aby zacząć (Brak CORS - działa prosto z pliku)
        </div>
        <div id="menu">
            <button id="save-btn">Zapisz Świat</button>
            <button id="load-btn">Wczytaj Świat</button>
        </div>
    </div>

    <!-- Import Three.js jako skrypt globalny -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Import PointerLockControls z CDN, bo nie jest w standardowym Three.js minified -->
    <script src="https://cdn.jsdelivr.net/gh/mrdoob/three.js@r128/examples/js/controls/PointerLockControls.js"></script>

    <script>
        // --- KONFIGURACJA I STAŁE ---
        const BLOCK_TYPES = {
            GRASS: { id: 1, color: 0x4d9030, name: 'Trawa' },
            DIRT: { id: 2, color: 0x5d4037, name: 'Ziemia' },
            STONE: { id: 3, color: 0x757575, name: 'Kamień' }
        };

        // --- WORLD CLASS ---
        class World {
            constructor(scene) {
                this.scene = scene;
                this.blocks = new Map();
                this.chunkSize = 16;
                this.geometry = new THREE.BoxGeometry(1, 1, 1);
                this.generate();
            }

            generate() {
                for (let x = -this.chunkSize/2; x < this.chunkSize/2; x++) {
                    for (let z = -this.chunkSize/2; z < this.chunkSize/2; z++) {
                        for (let y = 0; y < 2; y++) this.addBlock(x, y, z, BLOCK_TYPES.STONE.id);
                        this.addBlock(x, 2, z, BLOCK_TYPES.DIRT.id);
                        this.addBlock(x, 3, z, BLOCK_TYPES.GRASS.id);
                    }
                }
            }

            addBlock(x, y, z, typeId) {
                const key = `${x},${y},${z}`;
                if (this.blocks.has(key)) return;

                let color;
                if (typeId === BLOCK_TYPES.GRASS.id) color = BLOCK_TYPES.GRASS.color;
                else if (typeId === BLOCK_TYPES.DIRT.id) color = BLOCK_TYPES.DIRT.color;
                else if (typeId === BLOCK_TYPES.STONE.id) color = BLOCK_TYPES.STONE.color;
                else color = 0xffffff;

                const material = new THREE.MeshStandardMaterial({ color: color });
                const mesh = new THREE.Mesh(this.geometry, material);
                mesh.position.set(x, y, z);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                mesh.userData.typeId = typeId;

                this.scene.add(mesh);
                this.blocks.set(key, mesh);
            }

            removeBlock(x, y, z) {
                const key = `${x},${y},${z}`;
                const mesh = this.blocks.get(key);
                if (mesh) {
                    this.scene.remove(mesh);
                    mesh.geometry.dispose();
                    mesh.material.dispose();
                    this.blocks.delete(key);
                }
            }

            getBlock(x, y, z) {
                return this.blocks.get(`${x},${y},${z}`);
            }

            save() {
                const data = [];
                this.blocks.forEach((mesh, key) => {
                    const [x, y, z] = key.split(',').map(Number);
                    data.push({ x, y, z, typeId: mesh.userData.typeId });
                });
                localStorage.setItem('minecraft_world_v2', JSON.stringify(data));
                alert('Świat zapisany!');
            }

            load() {
                const dataStr = localStorage.getItem('minecraft_world_v2');
                if (!dataStr) { alert('Brak zapisanego świata!'); return; }

                this.blocks.forEach((mesh, key) => {
                    const [x, y, z] = key.split(',').map(Number);
                    this.removeBlock(x, y, z);
                });

                const data = JSON.parse(dataStr);
                data.forEach(b => this.addBlock(b.x, b.y, b.z, b.typeId));
                alert('Świat wczytany!');
            }
        }

        // --- INVENTORY CLASS ---
        class Inventory {
            constructor() {
                this.slots = [BLOCK_TYPES.GRASS, BLOCK_TYPES.DIRT, BLOCK_TYPES.STONE];
                this.selectedIndex = 0;
                this.initUI();
            }

            initUI() {
                const bar = document.getElementById('inventory-bar');
                bar.innerHTML = '';
                this.slots.forEach((block, index) => {
                    const slot = document.createElement('div');
                    slot.className = 'inventory-slot' + (index === this.selectedIndex ? ' active' : '');
                    slot.innerHTML = block.name[0];
                    slot.style.color = 'white';
                    bar.appendChild(slot);
                });
            }

            selectSlot(index) {
                if (index >= 0 && index < this.slots.length) {
                    this.selectedIndex = index;
                    const slots = document.querySelectorAll('.inventory-slot');
                    slots.forEach((s, i) => i === index ? s.classList.add('active') : s.classList.remove('active'));
                }
            }

            getSelectedBlockId() { return this.slots[this.selectedIndex].id; }
        }

        // --- PLAYER CLASS ---
        class Player {
            constructor(camera, world, inventory) {
                this.camera = camera;
                this.world = world;
                this.inventory = inventory;
                this.controls = new THREE.PointerLockControls(camera, document.body);
                
                this.moveForward = false; this.moveBackward = false;
                this.moveLeft = false; this.moveRight = false;
                this.canJump = false;
                this.velocity = new THREE.Vector3();
                this.direction = new THREE.Vector3();
                this.height = 1.8;
                this.camera.position.y = 5;
                this.raycaster = new THREE.Raycaster();
                
                this.initListeners();
            }

            initListeners() {
                document.addEventListener('keydown', (e) => {
                    switch (e.code) {
                        case 'KeyW': this.moveForward = true; break;
                        case 'KeyA': this.moveLeft = true; break;
                        case 'KeyS': this.moveBackward = true; break;
                        case 'KeyD': this.moveRight = true; break;
                        case 'Space': if (this.canJump) this.velocity.y += 10; this.canJump = false; break;
                        case 'Digit1': this.inventory.selectSlot(0); break;
                        case 'Digit2': this.inventory.selectSlot(1); break;
                        case 'Digit3': this.inventory.selectSlot(2); break;
                    }
                });
                document.addEventListener('keyup', (e) => {
                    switch (e.code) {
                        case 'KeyW': this.moveForward = false; break;
                        case 'KeyA': this.moveLeft = false; break;
                        case 'KeyS': this.moveBackward = false; break;
                        case 'KeyD': this.moveRight = false; break;
                    }
                });
                document.addEventListener('mousedown', (e) => {
                    if (!this.controls.isLocked) return;
                    if (e.button === 0) this.performAction('remove');
                    if (e.button === 2) this.performAction('add');
                });
            }

            performAction(action) {
                this.raycaster.setFromCamera({ x: 0, y: 0 }, this.camera);
                const blocksArray = Array.from(this.world.blocks.values());
                const intersects = this.raycaster.intersectObjects(blocksArray);

                if (intersects.length > 0) {
                    const intersect = intersects[0];
                    if (intersect.distance < 5) {
                        const pos = intersect.object.position;
                        if (action === 'remove') {
                            this.world.removeBlock(pos.x, pos.y, pos.z);
                        } else {
                            const n = intersect.face.normal;
                            const nx = Math.round(pos.x + n.x);
                            const ny = Math.round(pos.y + n.y);
                            const nz = Math.round(pos.z + n.z);
                            this.world.addBlock(nx, ny, nz, this.inventory.getSelectedBlockId());
                        }
                    }
                }
            }

            update(delta) {
                this.velocity.x -= this.velocity.x * 10.0 * delta;
                this.velocity.z -= this.velocity.z * 10.0 * delta;
                this.velocity.y -= 9.8 * 3.0 * delta;

                this.direction.z = Number(this.moveForward) - Number(this.moveBackward);
                this.direction.x = Number(this.moveRight) - Number(this.moveLeft);
                this.direction.normalize();

                if (this.moveForward || this.moveBackward) this.velocity.z -= this.direction.z * 400.0 * delta;
                if (this.moveLeft || this.moveRight) this.velocity.x -= this.direction.x * 400.0 * delta;

                this.controls.moveRight(-this.velocity.x * delta);
                this.controls.moveForward(-this.velocity.z * delta);
                this.camera.position.y += (this.velocity.y * delta);

                const feetY = this.camera.position.y - this.height;
                const blockBelow = this.world.getBlock(Math.round(this.camera.position.x), Math.floor(feetY), Math.round(this.camera.position.z));

                if (feetY < (blockBelow ? blockBelow.position.y + 0.5 : -10)) {
                    this.velocity.y = 0;
                    this.camera.position.y = (blockBelow ? blockBelow.position.y + 0.5 : -10) + this.height;
                    this.canJump = true;
                }
            }
        }

        // --- MAIN GAME ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 20, 100);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sun = new THREE.DirectionalLight(0xffffff, 0.8);
        sun.position.set(50, 100, 50);
        scene.add(sun);

        const world = new World(scene);
        const inventory = new Inventory();
        const player = new Player(camera, world, inventory);
        const clock = new THREE.Clock();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        document.getElementById('save-btn').onclick = (e) => { e.stopPropagation(); world.save(); };
        document.getElementById('load-btn').onclick = (e) => { e.stopPropagation(); world.load(); };
        document.getElementById('instructions').onclick = () => player.controls.lock();
        
        player.controls.addEventListener('lock', () => document.getElementById('instructions').style.display = 'none');
        player.controls.addEventListener('unlock', () => document.getElementById('instructions').style.display = 'block');

        function animate() {
            requestAnimationFrame(animate);
            if (player.controls.isLocked) player.update(clock.getDelta());
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
