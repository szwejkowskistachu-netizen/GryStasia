KU<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🤖 Chatbot</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 20px;
        }

        .api-key-container {
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        #api-key {
            flex-grow: 1;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        #chat-window {
            flex-grow: 1;
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 15px;
            overflow-y: auto;
            margin-bottom: 20px;
            background-color: #f9f9f9;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background-color: #e0e0e0;
            color: black;
            border-bottom-right-radius: 2px;
        }

        .bot-message {
            align-self: flex-start;
            background-color: #007bff;
            color: white;
            border-bottom-left-radius: 2px;
        }

        .label {
            font-weight: bold;
            font-size: 0.8em;
            margin-bottom: 4px;
            display: block;
        }

        .input-container {
            display: flex;
            gap: 10px;
        }

        #user-input {
            flex-grow: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            resize: none;
            height: 50px;
        }

        #send-btn {
            padding: 10px 20px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }

        #send-btn:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        #loading-indicator {
            display: none;
            text-align: center;
            font-style: italic;
            color: #666;
            margin-bottom: 10px;
        }

        .error-message {
            color: #dc3545;
            background-color: #f8d7da;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

    <header>
        <h1>🤖 Chatbot</h1>
    </header>

    <div class="api-key-container">
        <label for="api-key">Twój klucz Anthropic API:</label>
        <input type="password" id="api-key" placeholder="sk-ant-...">
    </div>

    <div id="chat-window">
        <!-- Wiadomości pojawią się tutaj -->
    </div>

    <div id="loading-indicator">Bot pisze...</div>

    <div class="input-container">
        <textarea id="user-input" placeholder="Wpisz wiadomość..."></textarea>
        <button id="send-btn">Wyślij</button>
    </div>

    <script>
        const chatWindow = document.getElementById('chat-window');
        const userInput = document.getElementById('user-input');
        const sendBtn = document.getElementById('send-btn');
        const apiKeyInput = document.getElementById('api-key');
        const loadingIndicator = document.getElementById('loading-indicator');

        let messageHistory = [];

        function appendMessage(role, text, isError = false) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role === 'user' ? 'user-message' : 'bot-message'} ${isError ? 'error-message' : ''}`;
            
            const label = document.createElement('span');
            label.className = 'label';
            label.textContent = role === 'user' ? 'Ty:' : 'Bot:';
            
            const content = document.createElement('div');
            content.textContent = text;
            
            messageDiv.appendChild(label);
            messageDiv.appendChild(content);
            chatWindow.appendChild(messageDiv);
            
            // Scroll to bottom
            chatWindow.scrollTop = chatWindow.scrollHeight;
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            const apiKey = apiKeyInput.value.trim();

            if (!apiKey) {
                alert("Wpisz klucz API!");
                return;
            }

            if (!text) return;

            // Add user message to UI and history
            appendMessage('user', text);
            messageHistory.push({ role: 'user', content: text });
            
            userInput.value = '';
            userInput.disabled = true;
            sendBtn.disabled = true;
            loadingIndicator.style.display = 'block';

            try {
                const response = await fetch('https://api.anthropic.com/v1/messages', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': apiKey,
                        'anthropic-version': '2023-06-01',
                        'anthropic-dangerous-direct-browser-access': 'true'
                    },
                    body: JSON.stringify({
                        model: 'claude-3-5-sonnet-20241022',
                        max_tokens: 1024,
                        messages: messageHistory
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error ? data.error.message : 'Nieznany błąd');
                }

                const botResponse = data.content[0].text;
                appendMessage('bot', botResponse);
                messageHistory.push({ role: 'assistant', content: botResponse });

            } catch (error) {
                appendMessage('bot', `Błąd: ${error.message}`, true);
                console.error('API Error:', error);
            } finally {
                loadingIndicator.style.display = 'none';
                userInput.disabled = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        sendBtn.addEventListener('click', sendMessage);

        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
