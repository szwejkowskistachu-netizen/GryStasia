<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mage of the Abyss - Boss Edition</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #050510; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; justify-content: center; align-items: center; color: #e0e0e0; }
        #crosshair { width: 20px; height: 20px; font-size: 24px; text-align: center; line-height: 20px; color: rgba(255, 100, 0, 0.8); text-shadow: 0 0 5px #ff4500; }
        #instructions { position: absolute; background: rgba(255, 255, 255, 0.95); padding: 30px; text-align: center; border: 2px solid #aaa; pointer-events: auto; cursor: pointer; border-radius: 15px; box-shadow: 0 0 40px rgba(0, 0, 0, 0.2); max-width: 450px; z-index: 10; color: #333; }
        #instructions h1 { margin: 0 0 15px 0; color: #222; text-transform: uppercase; letter-spacing: 3px; font-size: 28px; }
        #instructions p { margin: 10px 0; line-height: 1.5; }
        .key { background: #eee; padding: 2px 6px; border-radius: 4px; font-family: monospace; color: #d35400; border: 1px solid #ccc; }
        #hud { position: absolute; bottom: 20px; left: 20px; pointer-events: none; color: #fff; text-shadow: 1px 1px 2px #000; font-weight: bold; font-size: 18px; }
        .bar-container { width: 200px; height: 20px; background: rgba(255,255,255,0.1); border: 1px solid #555; margin-top: 5px; }
        .bar { height: 100%; transition: width 0.3s; }
        #health-bar { background: #ff3333; width: 100%; }
        #mana-bar { background: #3333ff; width: 100%; }
        #boss-hud { position: absolute; top: 20px; width: 60%; left: 20%; display: none; text-align: center; color: #ff0000; }
        #boss-bar-container { width: 100%; height: 15px; background: rgba(0,0,0,0.5); border: 2px solid #f00; }
        #boss-bar { background: #f00; width: 100%; height: 100%; }
        #minimap-container { position: absolute; top: 20px; right: 20px; width: 180px; height: 180px; background: rgba(0, 0, 0, 0.6); border: 2px solid #888; border-radius: 10px; overflow: hidden; }
        #minimap { width: 100%; height: 100%; position: relative; }
        .dot { position: absolute; width: 8px; height: 8px; border-radius: 50%; transform: translate(-50%, -50%); border: 1px solid #000; }
        .player-dot { background: #00ff00; z-index: 5; }
        .enemy-dot { background: #ff0000; }
        .boss-dot { background: #ff00ff; width: 12px; height: 12px; }
        .shop-dot { background: #ffff00; }
    </style>
    <script type="importmap">
        { "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js", "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/" } }
    </script>
</head>
<body>
    <div id="ui">
        <div id="crosshair">+</div>
        <div id="instructions">
            <h1>Mage of the Abyss</h1>
            <p>The Void Boss has awakened in the center!</p>
            <p><span class="key">WASD</span> to Move | <span class="key">MOUSE</span> to Look</p>
            <p><span class="key">LEFT CLICK</span> to cast Fireball</p>
            <p>Visit the <span style="color: #ffff00;">Gold Shop</span> to heal.</p>
            <hr style="border: 0; border-top: 1px solid #444; margin: 20px 0;">
            <p style="color: #ff6600; font-weight: bold; font-size: 20px;">CLICK TO DEFY THE VOID</p>
        </div>
    </div>

    <div id="hud">
        Health
        <div class="bar-container"><div id="health-bar" class="bar"></div></div>
        Mana
        <div class="bar-container"><div id="mana-bar" class="bar"></div></div>
    </div>

    <div id="boss-hud">
        <div id="boss-name">VOID OVERLORD</div>
        <div id="boss-bar-container"><div id="boss-bar"></div></div>
    </div>

    <div id="minimap-container">
        <div id="minimap"></div>
    </div>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

        // --- Configuration ---
        const WORLD_SIZE = 400;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb); // Sky blue
        scene.fog = new THREE.Fog(0x87ceeb, 50, 200);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.6, 40);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        const controls = new PointerLockControls(camera, document.body);
        const instructions = document.getElementById('instructions');
        instructions.addEventListener('click', () => controls.lock());
        controls.addEventListener('lock', () => instructions.style.display = 'none');
        controls.addEventListener('unlock', () => instructions.style.display = 'block');

        // --- State ---
        let health = 100, mana = 100;
        const keys = { w: false, a: false, s: false, d: false };
        const velocity = new THREE.Vector3(), direction = new THREE.Vector3();
        const fireballs = [], enemies = [];
        let boss = null;

        document.addEventListener('keydown', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
        document.addEventListener('keyup', (e) => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        // --- Lighting ---
        scene.add(new THREE.AmbientLight(0xffffff, 0.6));
        const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunLight.position.set(100, 200, 100);
        sunLight.castShadow = true;
        sunLight.shadow.camera.left = -200;
        sunLight.shadow.camera.right = 200;
        sunLight.shadow.camera.top = 200;
        sunLight.shadow.camera.bottom = -200;
        sunLight.shadow.mapSize.width = 2048;
        sunLight.shadow.mapSize.height = 2048;
        scene.add(sunLight);

        // --- Environment ---
        const floor = new THREE.Mesh(new THREE.PlaneGeometry(WORLD_SIZE, WORLD_SIZE), new THREE.MeshStandardMaterial({ color: 0x3d5e3d })); // Grassy green
        floor.rotation.x = -Math.PI / 2;
        floor.receiveShadow = true;
        scene.add(floor);

        function createPillar(x, z, h) {
            const mesh = new THREE.Mesh(new THREE.BoxGeometry(2, h, 2), new THREE.MeshStandardMaterial({ color: 0x8b8b8b })); // Lighter stone
            mesh.position.set(x, h/2, z);
            mesh.castShadow = true; mesh.receiveShadow = true;
            scene.add(mesh);
        }
        for(let i=0; i<60; i++) {
            let rx = (Math.random()-0.5)*250, rz = (Math.random()-0.5)*250;
            if(Math.abs(rx) < 20 && Math.abs(rz) < 20) continue;
            createPillar(rx, rz, 5 + Math.random()*20);
        }

        // --- Shop ---
        const shopPos = new THREE.Vector3(30, 0, 30);
        const shop = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), new THREE.MeshStandardMaterial({ color: 0xffaa00, emissive: 0xffaa00, emissiveIntensity: 0.5 }));
        shop.position.set(shopPos.x, 1.5, shopPos.z);
        scene.add(shop);
        const shopLight = new THREE.PointLight(0xffaa00, 10, 15);
        shopLight.position.set(shopPos.x, 3, shopPos.z);
        scene.add(shopLight);

        // --- Entities ---
        function spawnEnemy(isBoss = false) {
            const geo = isBoss ? new THREE.SphereGeometry(4, 32, 32) : new THREE.CapsuleGeometry(0.8, 1.5, 4, 12);
            const mat = new THREE.MeshStandardMaterial({ color: isBoss ? 0xff00ff : 0xaa0000, emissive: isBoss ? 0x220022 : 0x110000 });
            const mesh = new THREE.Mesh(geo, mat);
            
            if (isBoss) {
                mesh.position.set(0, 5, 0);
                mesh.userData = { health: 500, maxHealth: 500, isBoss: true };
                boss = mesh;
                document.getElementById('boss-hud').style.display = 'block';
            } else {
                let rx = (Math.random()-0.5)*200, rz = (Math.random()-0.5)*200;
                while(Math.abs(rx) < 30 && Math.abs(rz) < 30) { rx *= 1.5; rz *= 1.5; }
                mesh.position.set(rx, 1.25, rz);
                mesh.userData = { health: 30, isBoss: false };
                
                // Eyes
                const eye = new THREE.Mesh(new THREE.SphereGeometry(0.15, 8, 8), new THREE.MeshBasicMaterial({ color: 0x00ffff }));
                const eyeL = eye.clone(); eyeL.position.set(-0.3, 0.5, 0.6);
                const eyeR = eye.clone(); eyeR.position.set(0.3, 0.5, 0.6);
                mesh.add(eyeL, eyeR);
            }
            
            mesh.castShadow = true;
            scene.add(mesh);
            enemies.push(mesh);
        }

        for(let i=0; i<15; i++) spawnEnemy();
        spawnEnemy(true); // Spawn Boss

        // --- Casting ---
        function cast() {
            if (!controls.isLocked || mana < 10) return;
            mana -= 10;
            const fireball = new THREE.Mesh(new THREE.SphereGeometry(0.4, 16, 16), new THREE.MeshBasicMaterial({ color: 0xff4500 }));
            const dir = new THREE.Vector3(); camera.getWorldDirection(dir);
            fireball.position.copy(camera.position).add(dir.clone().multiplyScalar(1.5));
            fireball.userData = { vel: dir.multiplyScalar(1.5), life: 120 };
            const pl = new THREE.PointLight(0xff4500, 5, 10); fireball.add(pl);
            scene.add(fireball); fireballs.push(fireball);
        }
        document.addEventListener('mousedown', (e) => { if(e.button === 0) cast(); });

        // --- Minimap ---
        const minimap = document.getElementById('minimap');
        function updateMinimap() {
            minimap.innerHTML = '';
            const dots = [{ pos: camera.position, cls: 'player-dot' }, { pos: shopPos, cls: 'shop-dot' }];
            enemies.forEach(e => dots.push({ pos: e.position, cls: e.userData.isBoss ? 'boss-dot' : 'enemy-dot' }));
            dots.forEach(d => {
                const dx = (d.pos.x - camera.position.x) * 0.6, dz = (d.pos.z - camera.position.z) * 0.6;
                if (Math.sqrt(dx*dx + dz*dz) < 90) {
                    const dot = document.createElement('div'); dot.className = 'dot ' + d.cls;
                    dot.style.left = (90 + dx) + 'px'; dot.style.top = (90 + dz) + 'px';
                    minimap.appendChild(dot);
                }
            });
        }

        // --- Loop ---
        let lastTime = performance.now();
        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now(), delta = (time - lastTime) / 1000;
            lastTime = time;

            if (controls.isLocked) {
                velocity.x -= velocity.x * 10.0 * delta; velocity.z -= velocity.z * 10.0 * delta;
                direction.z = Number(keys.w) - Number(keys.s); direction.x = Number(keys.d) - Number(keys.a);
                direction.normalize();
                if (keys.w || keys.s) velocity.z -= direction.z * 150.0 * delta;
                if (keys.a || keys.d) velocity.x -= direction.x * 150.0 * delta;
                controls.moveRight(-velocity.x * delta); controls.moveForward(-velocity.z * delta);
                if (camera.position.distanceTo(shopPos) < 5) {
                    health = Math.min(100, health + delta * 20); mana = Math.min(100, mana + delta * 30);
                }
            }

            for (let i = fireballs.length - 1; i >= 0; i--) {
                const f = fireballs[i]; f.position.add(f.userData.vel); f.userData.life--;
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (f.position.distanceTo(e.position) < (e.userData.isBoss ? 5 : 2)) {
                        e.userData.health -= 10; f.userData.life = 0;
                        if (e.userData.health <= 0) {
                            scene.remove(e); enemies.splice(j, 1);
                            if (e.userData.isBoss) { boss = null; document.getElementById('boss-hud').style.display = 'none'; }
                            else spawnEnemy();
                        }
                    }
                }
                if (f.userData.life <= 0) { scene.remove(f); fireballs.splice(i, 1); }
            }

            enemies.forEach(e => {
                const dist = camera.position.distanceTo(e.position);
                const dir = new THREE.Vector3().subVectors(camera.position, e.position); dir.y = 0; dir.normalize();
                if (dist < 60) {
                    e.position.add(dir.multiplyScalar(e.userData.isBoss ? 0.03 : 0.08));
                    e.lookAt(camera.position.x, e.position.y, camera.position.z);
                    if (dist < (e.userData.isBoss ? 5 : 2)) health -= (e.userData.isBoss ? 0.5 : 0.1);
                }
                if (e.userData.isBoss) {
                    e.rotation.y += 0.05; e.position.y = 5 + Math.sin(time*0.002)*2;
                    document.getElementById('boss-bar').style.width = (e.userData.health / e.userData.maxHealth * 100) + '%';
                }
            });

            document.getElementById('health-bar').style.width = health + '%';
            document.getElementById('mana-bar').style.width = mana + '%';
            if (health <= 0) { alert("You have been consumed by the Void."); location.reload(); }

            updateMinimap();
            renderer.render(scene, camera);
        }
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
        animate();
    </script>
</body>
</html>
