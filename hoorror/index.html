<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proceduralny Horror</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <div id="hud">
                <div class="stat">BATERIA: <span id="battery-level">100</span>%</div>
                <div class="stat">CEL: <span id="current-objective">Eksploruj budynek</span></div>
            </div>
            <div id="fear-overlay"></div>
            <div id="inventory-ui" class="hidden">
                <h3>Ekwipunek</h3>
                <ul id="item-list"></ul>
            </div>
            <div id="menu-overlay" class="overlay">
                <div class="content">
                    <h1>PROCEDURALNY HORROR</h1>
                    <p>Obudziłeś się w opuszczonym miejscu... Znajdź wyjście, zanim ON znajdzie Ciebie.</p>
                    <button id="start-btn">ROZPOCZNIJ GRĘ</button>
                    <div class="difficulty-select">
                        <label><input type="radio" name="difficulty" value="easy"> Łatwy</label>
                        <label><input type="radio" name="difficulty" value="normal" checked> Normalny</label>
                        <label><input type="radio" name="difficulty" value="nightmare"> Koszmar</label>
                    </div>
                </div>
            </div>
            <div id="death-screen" class="overlay hidden">
                <div class="content">
                    <h1 class="red">NIE ŻYJESZ</h1>
                    <p id="death-cause"></p>
                    <button id="retry-btn">SPRÓBUJ PONOWNIE</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/game.js"></script>
</body>
