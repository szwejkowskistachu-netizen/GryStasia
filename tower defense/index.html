<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tower Defense Pro</title>
    <style>
        body { margin: 0; overflow: hidden; background: #222; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        canvas { display: block; background: #1a1a1a; }
        
        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            box-sizing: border-box;
        }

        .stats {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            width: fit-content;
            border: 1px solid #444;
        }

        #menu, #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            pointer-events: auto;
            border: 2px solid #555;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        button {
            background: #4CAF50;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 10px 2px;
            cursor: pointer;
            border-radius: 5px;
            transition: background 0.3s;
        }

        button:hover { background: #45a049; }
        button:disabled { background: #333; cursor: not-allowed; }

        .shop {
            pointer-events: auto;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            display: flex;
            gap: 10px;
            border: 1px solid #444;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>

    <div id="ui-layer">
        <div class="stats hidden" id="game-stats">
            <div>Base HP: <span id="hp-val">100</span></div>
            <div>Money: $<span id="money-val">100</span></div>
        </div>

        <div id="menu">
            <h1>TOWER DEFENSE</h1>
            <button onclick="startGame()">Start Game</button>
        </div>

        <div id="game-over" class="hidden">
            <h1>GAME OVER</h1>
            <p>Your base was destroyed!</p>
            <button onclick="location.reload()">Restart</button>
        </div>

        <div class="shop hidden" id="game-shop">
            <button onclick="buyBaseUpgrade()">Upgrade Base (+20 HP) - $50</button>
            <button onclick="buyTower()">Build Tower - $100</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
